<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <script type="importmap">
    {
      "imports": {
        "jquery": "https://esm.sh/jquery@4"
      }
    }
  </script>

  <style>
    body {
      margin: 0;

      width: 100%;
      min-height: 100dvh;

      font-family: monospace;

      --theme: oklch(0.8 0.15 350);
      --shadow: 0 .125rem .5rem -.25rem color-mix(in oklab, var(--theme) 80%, black);

      display: grid;
      place-content: center;
    }

    main {
      width: fit-content;
      margin-inline: auto;

      display: grid;
      grid-template-columns: repeat(4, 6rem);
      grid-template-rows: repeat(6, 6rem);

      gap: .25rem;

      padding: 1rem;
      border-radius: 3rem;

      background-color: color-mix(in oklab, var(--theme) 50%, white);
      box-shadow: var(--shadow);

      font-size: 2rem;

      * {
        text-align: center;
        place-content: center;

        --button-color: white;

        background-color: var(--button-color);
        box-shadow: var(--shadow);

        border-radius: 100rem;

        &:not(.result) {


          cursor: pointer;
          user-select: none;

          transition-property: background-color;
          transition-duration: .1s;
          transition-timing-function: ease-out;

          &:hover {
            background-color: color-mix(in oklch, var(--button-color) 98%, black);
          }

          &:active {
            background-color: color-mix(in oklch, var(--button-color) 90%, black);
          }
        }
      }

      .result {
        width: unset;
        box-sizing: content-box;
        grid-column: 1 / -1;

        text-align: start;
        padding-inline: 2rem;

        overflow: hidden;

        border-radius: 2rem;
      }

      .modifier {
        --button-color: color-mix(in oklab, var(--theme) 20%, white);

        border-radius: 2rem;

        &.strong {
          color: white;
          --button-color: var(--theme);
        }
      }
    }
  </style>
</head>

<body>
  <main>
    <!-- <div class="result" dir="rtl">123,456,789,012,345</div>

    <div class="modifier strong">AC</div>
    <div class="modifier">()</div>
    <div class="modifier">&percnt;</div>
    <div class="modifier">&divide;</div>

    <div>7</div>
    <div>8</div>
    <div>9</div>
    <div class="modifier">&times;</div>

    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div class="modifier">&minus;</div>

    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div class="modifier">&plus;</div>

    <div>0</div>
    <div>&period;</div>
    <div>&#x232B;</div>
    <div class="modifier strong">&equals;</div> -->
  </main>

  <script type="module">
    import $ from "jquery";

    await $.ready;

    const result = $("<div>", {
      class: "result",
      dir: "rtl",
      text: "0",
    });
    const stack = {
      _s: "",
      get top() {
        return this._s;
      },
      set top(v) {
        this._s = v;
        result.text(v);
      },

      append(v) {
        this.top = this.top + v;
      },
      pop() {
        this.top = this.top.slice(0, -1);
      },
    }

    $("main").append(
      result,

      $("<div>", {
        class: "modifier strong",
        text: "AC",
      }),
      $("<div>", {
        class: "modifier",
        text: "()",
      }),
      $("<div>", {
        class: "modifier",
        html: "&percnt;",
      }),
      $("<div>", {
        class: "modifier",
        html: "&divide;",
      }),

      $("<div>", {
        text: "7",
        click: () => { stack.append(7) },
      }),
      $("<div>", {
        text: "8",
        click: () => { stack.append(8) },
      }),
      $("<div>", {
        text: "9",
        click: () => { stack.append(9) },
      }),
      $("<div>", {
        class: "modifier",
        html: "&times;",
      }),

      $("<div>", {
        text: "4",
        click: () => { stack.append(4) },
      }),
      $("<div>", {
        text: "5",
        click: () => { stack.append(5) },
      }),
      $("<div>", {
        text: "6",
        click: () => { stack.append(6) },
      }),
      $("<div>", {
        class: "modifier",
        html: "&minus;",
      }),

      $("<div>", {
        text: "1",
        click: () => { stack.append(1) },
      }),
      $("<div>", {
        text: "2",
        click: () => { stack.append(2) },
      }),
      $("<div>", {
        text: "3",
        click: () => { stack.append(3) },
      }),
      $("<div>", {
        class: "modifier",
        html: "&plus;",
      }),

      $("<div>", {
        text: "0",
        click: () => { stack.append(0) },
      }),
      $("<div>", {
        html: "&period;",
      }),
      $("<div>", {
        html: "&#x232B;",
      }),
      $("<div>", {
        class: "modifier strong",
        html: "&equals;",
      }),
    );
  </script>
</body>

</html>
