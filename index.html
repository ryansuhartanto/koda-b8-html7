<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      margin: 0;

      width: 100%;
      min-height: 100dvh;

      font-family: monospace;

      --theme: oklch(0.8 0.15 350);
      --shadow: 0 .125rem .5rem -.25rem color-mix(in oklab, var(--theme) 80%, black);

      display: grid;
      place-content: center;
    }

    main {
      width: fit-content;
      margin-inline: auto;

      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(4, minmax(0, 1fr));

      gap: .25rem;

      padding: 1rem;
      border-radius: 3rem;

      background-color: color-mix(in oklab, var(--theme) 50%, white);
      box-shadow: var(--shadow);

      font-size: 2rem;

      >div {
        width: 6rem;
        height: 6rem;

        text-align: center;
        place-content: center;

        background-color: white;
        box-shadow: var(--shadow);

        border-radius: 100rem;
      }

      .result {
        width: unset;
        box-sizing: content-box;
        grid-column: 1 / -1;

        text-align: start;
        padding-inline: 2rem;

        overflow: hidden;

        border-radius: 2rem;
      }

      .modifier {
        background-color: color-mix(in oklab, var(--theme) 20%, white);

        border-radius: 2rem;

        &.strong {
          color: white;
          background-color: var(--theme);
        }
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="result" dir="rtl">123,456,789,012</div>

    <div class="modifier strong">AC</div>
    <div class="modifier">()</div>
    <div class="modifier">&percnt;</div>
    <div class="modifier">&divide;</div>

    <div>7</div>
    <div>8</div>
    <div>9</div>
    <div class="modifier">&times;</div>

    <div>4</div>
    <div>5</div>
    <div>6</div>
    <div class="modifier">&minus;</div>

    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div class="modifier">&plus;</div>

    <div>0</div>
    <div>&period;</div>
    <div>&#x232B;</div>
    <div class="modifier strong">&equals;</div>
  </main>
</body>

</html>
