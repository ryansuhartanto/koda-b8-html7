<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <script type="importmap">
    {
      "imports": {
        "jquery": "https://esm.sh/jquery@4"
      }
    }
  </script>

  <style>
    body {
      margin: 0;

      width: 100%;
      min-height: 100dvh;

      font-family: monospace;

      --theme: oklch(0.8 0.15 350);
      --shadow: 0 0.125rem 0.5rem -0.25rem color-mix(in oklab, var(--theme) 80%, black);

      display: grid;
      place-content: center;
    }

    main {
      width: fit-content;
      margin-inline: auto;

      display: grid;
      grid-template-columns: repeat(4, 6rem);
      grid-template-rows: repeat(6, 6rem);

      gap: 0.25rem;

      padding: 1rem;
      border-radius: 3rem;

      background-color: color-mix(in oklab, var(--theme) 50%, white);
      box-shadow: var(--shadow);

      font-size: 2rem;

      * {
        text-align: center;
        place-content: center;

        --button-color: white;

        background-color: var(--button-color);
        box-shadow: var(--shadow);

        border-radius: 100rem;

        &:not(.result) {
          cursor: pointer;
          user-select: none;

          transition-property: background-color;
          transition-duration: 0.1s;
          transition-timing-function: ease-out;

          &:hover {
            background-color: color-mix(in oklch, var(--button-color) 98%, black);
          }

          &:active {
            background-color: color-mix(in oklch, var(--button-color) 90%, black);
          }
        }
      }

      .result {
        width: unset;
        box-sizing: content-box;
        grid-column: 1 / -1;

        text-align: start;
        padding-inline: 2rem;

        overflow: hidden;

        border-radius: 2rem;
      }

      .modifier {
        --button-color: color-mix(in oklab, var(--theme) 20%, white);

        border-radius: 2rem;

        &.strong {
          color: white;
          --button-color: var(--theme);
        }
      }
    }
  </style>
</head>

<body>
  <main>

  </main>

  <script type="module">
    import $ from "jquery";

    await $.ready;

    const result = $("<div>", {
      class: "result",
      dir: "rtl",
      text: "0",
    });
    const calc = {
      _entry: "0",
      _accum: null,
      _op: null,
      _fresh: false,

      _show(v) {
        this._entry = String(v);
        result.text(this._entry);
      },

      _flush() {
        if (this._op === null || this._accum === null) return;
        const b = parseFloat(this._entry);
        const ops = {
          "+": (a, b) => a + b,
          "-": (a, b) => a - b,
          "*": (a, b) => a * b,
          "/": (a, b) => a / b,
        };
        this._show(ops[this._op](this._accum, b));
        this._accum = null;
      },

      digit(d) {
        if (this._fresh) {
          this._entry = "0";
          this._fresh = false;
        }
        if (d === "." && this._entry.includes(".")) return;
        const next = this._entry === "0" && d !== "." ? String(d) : this._entry + d;
        this._show(next);
      },

      backspace() {
        if (this._fresh) return;
        this._show(this._entry.length > 1 ? this._entry.slice(0, -1) : "0");
      },

      op(operator) {
        this._flush();
        this._accum = parseFloat(this._entry);
        this._op = operator;
        this._fresh = true;
      },

      equals() {
        this._flush();
        this._op = null;
        this._fresh = true;
      },

      negate() {
        this._show(parseFloat(this._entry) * -1);
      },

      clear() {
        this._entry = "0";
        this._fresh = false;
        this._show("0");
      },

      allClear() {
        this._entry = "0";
        this._accum = null;
        this._op = null;
        this._fresh = false;
        this._show("0");
      },
    };

    $("main").append(
      result,

      $("<div>", {
        class: "modifier strong",
        text: "AC",
        click: () => calc.allClear(),
      }),
      $("<div>", {
        class: "modifier",
        text: "C",
        click: () => calc.clear(),
      }),
      $("<div>", {
        class: "modifier",
        text: "+/-",
        click: () => calc.negate(),
      }),
      $("<div>", {
        class: "modifier strong",
        html: "&divide;",
        click: () => calc.op("/"),
      }),

      $("<div>", {
        text: "7",
        click: () => calc.digit(7),
      }),
      $("<div>", {
        text: "8",
        click: () => calc.digit(8),
      }),
      $("<div>", {
        text: "9",
        click: () => calc.digit(9),
      }),
      $("<div>", {
        class: "modifier strong",
        html: "&times;",
        click: () => calc.op("*"),
      }),

      $("<div>", {
        text: "4",
        click: () => calc.digit(4),
      }),
      $("<div>", {
        text: "5",
        click: () => calc.digit(5),
      }),
      $("<div>", {
        text: "6",
        click: () => calc.digit(6),
      }),
      $("<div>", {
        class: "modifier strong",
        html: "&minus;",
        click: () => calc.op("-"),
      }),

      $("<div>", {
        text: "1",
        click: () => calc.digit(1),
      }),
      $("<div>", {
        text: "2",
        click: () => calc.digit(2),
      }),
      $("<div>", {
        text: "3",
        click: () => calc.digit(3),
      }),
      $("<div>", {
        class: "modifier strong",
        html: "&plus;",
        click: () => calc.op("+"),
      }),

      $("<div>", {
        text: "0",
        click: () => calc.digit(0),
      }),
      $("<div>", {
        html: "&period;",
        click: () => calc.digit("."),
      }),
      $("<div>", {
        html: "&#x232B;",
        click: () => calc.backspace(),
      }),
      $("<div>", {
        class: "modifier strong",
        html: "&equals;",
        click: () => calc.equals(),
      }),
    );
  </script>
</body>

</html>
